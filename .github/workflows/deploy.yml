name: Deploy

permissions:
  contents: read
  id-token: write

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          audience: sts.amazonaws.com
          aws-region: sa-east-1
          role-to-assume: arn:aws:iam::924568413237:role/githubActionsPermissions

      - name: Deploy
        shell: bash
        run: |
          npm install
          ./deploy.sh
